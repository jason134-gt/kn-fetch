//取对象的绝对位置
function realOffset(o)
{
  var x = y = 0; 
  do{
  x += o.offsetLeft || 0; 
  y += o.offsetTop || 0;
  o = o.offsetParent;
  }while(o);
  return {"x" : x, "y" : y};
}

//定义规则
var exp = "";//规则表达式
function appendS(o,vid)
{
	var dst ;
	//区分事件发生在哪个面板

	var id = vid;
	dst = $("#"+id+"");
	//光标的起始位置
	var cx =0;
	var variable = o;
	if(exp=="")
	{
		exp+=variable;
	}
	else
	{
		//当输入区与缓存不相等时，则认为用户做了删除操作，则以输入区内容为准
		if(dst.val()!=exp)
		{
			exp = dst.val();
		}

		//计算字符串的插入位置,并把新串插入到老串中
	    cx = dst[0].selectionStart;
		if(exp.length>cx+1)
		{
			exp = exp.substring(0,cx)+variable+exp.substring(cx,exp.length);
		}
		else
		{
			exp+=variable;
		}
		
	}	
	dst.val(exp);
	//重置光标位置
	dst[0].selectionStart = cx+variable.length;
}

function parseCfsrule(cfs)
{
	var type = cfs.type;
	if(type==0||type==1)
	{
		var indexname = cfs.indexName;
		var indexcode = cfs.indexCode;
		var score = cfs.score;
		var rule = cfs.rule;
		var referValue=cfs.referValue;
		var ra = rule.split("^");
		var indexs=indexname+":"+indexcode;
		var h = "<tr onclick='delRow(this,event,"+type+")'><td><input type='text' style='width:150' value='"+indexs+"'/></td><td>"+parseFloat(referValue).toFixed(7)+"</td><td><input type='text'  value='"+score+"'/></td><td><input type='text'  value='"+parseFloat(ra[0]).toFixed(7)+"'/></td>";
			h += "<td><input type='text'  value='"+parseFloat(ra[1]).toFixed(7)+"'/></td>";
			h += "<td><input type='text'  value='"+parseFloat(ra[2]).toFixed(7)+"'/></td>";
			h += "<td><input type='text'  value='"+parseFloat(ra[3]).toFixed(7)+"'/></td>";
			h += "<td><input type='text'  value='"+parseFloat(ra[4]).toFixed(7)+"'/></td>";
			h += "<td><input type='text' style='color:blue' value='"+parseFloat(cfs.cValue).toFixed(3)+"'/></td>";
			h += "<td><input type='text' style='color:green' value='"+parseFloat(cfs.weight).toFixed(3)+"'/></td>";
			h += "<td><input type='text'  style='color:red'value='"+parseFloat(cfs.resultValue).toFixed(3)+"'/></td>";
			h += "<td><span style='color:red;cursor:pointer' >X</span></td>";
			h += "</tr>";
		$("#tbody_"+type).append(h);
	}
	if(type==2)
	{
		var indexname = cfs.indexName;
		var indexcode = cfs.indexCode;
		var score = cfs.score;
		var rule = cfs.rule;
		var ra = rule.split("^");
		var indexs=indexname+":"+indexcode;
		var h = "<tr onclick='delRow(this,event,2)'>";
		h+="<td><input type='text'  style='width:150' value='"+indexname+"'/></td>";
		h+="<td><input type='text'  value='"+score+"'/></td>";
		h+="<td><input type='text'  style='color:green' value='"+parseFloat(cfs.weight).toFixed(3)+"'/></td>";
		h+="<td><input type='text'  style='color:red' value='"+parseFloat(cfs.resultValue).toFixed(3)+"'/></td>";
		h += "<td><span style='color:red;cursor:pointer' >X</span>&nbsp|&nbsp<span onclick=\"modifyFz('"+indexname+"')\"  style='color:red;cursor:pointer' >M</span></td>";
		h += "</tr>";
		$("#tbody_2").append(h);
	}
}

			$("#tbody_"+type).append(h);
		  });
		
		
	}
	if(type==3)
	{
		var num = $("#thead_"+type).find("textarea").size();
		var rindex = $("#tbody_3").children().length;
		var h = "<tr onclick='delRow(this,event,3)'>";
		h+="<td><input type='text'  placeholder='权重'/><span style='color:red;cursor:pointer' >X</span></td>";
		for(var i=0;i<num;i++)
		{
			h+="<td><select onchange='changeColor(this)'><option value='0' selected>否</option><option value='1'>是</option></select></td>";
		}
		h += "</tr>";
		$("#tbody_"+type).append(h);
	}
	if(type==2)
	{
		var h = "<tr onclick='delRow(this,event,2)'>";
		h+="<td><input type='text' style='width:150' placeholder='名称'/></td>";
		h+="<td><input type='text'  placeholder='总分'/></td>";
		h+="<td><input type='text'  placeholder='匹配权重'/></td>";
		h+="<td><input type='text'  placeholder='得分'/></td>";
		h += "<td><span style='color:red;cursor:pointer' >X</span>&nbsp|&nbsp<span style='color:red;cursor:pointer' >M</span></td>";
		h += "</tr>";
		$("#tbody_"+type).append(h);
	}

function delColumn(obj,event)
{
	if(event.target.textContent=="X")
	{
		var colnum = $(obj).closest("th").prevAll("th").length+1;
	   $("#tbody_3").find("tr td:nth-child(" + colnum + ")").remove();
	   $(obj).remove();
	}
	
}
function delRow(obj,event,type)
{
	if(event.target.textContent=="X")
	{
		if(type==3) 
		{
			$(obj).remove();
			return;
		}
		var name = $(obj).find("td:nth-child(1)")[0].firstChild.value;
		if(name=="")
		{
			alert("删除项的名字不可以空");
			return;
		}
		var id = $("#cfsid").val();
		var data={
			name:name.split(":")[0],
			type:type,
			id:id
		};
		$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
		$.post("/cfscore/delCfScoreRuleByKey",data, function(result){
				if(!result.success)	 
				  {
					alert("操作失败！");
					return 
				  }
				  else
				  {
					  alert("操作成功！"); 
					  $(obj).remove();
				  }
			  });
	}
		
}
function saveCfscore(type)
{
	var id = $("#cfsid").val();
	var bcfs = new Array();
	if(type==1||type==0)
	{
		//取基本指标值
		var bca = $("#tbody_"+type).children();
		for(var i=0;i<bca.length;i++)
		{
			var cr = bca[i];
			var indexs = $(cr).find("td")[0].firstChild.value;
			var score = $(cr).find("td")[2].firstChild.value;
			if(indexs==""||score=="") 
			{
				alert("指标名或分数不可以为空");
				$("#fz_name").focus();
				return;
			}
			var rule= $(cr).find("td")[3].firstChild.value+"^";
				rule+=$(cr).find("td")[4].firstChild.value+"^";
				rule+=$(cr).find("td")[5].firstChild.value+"^";
				rule+=$(cr).find("td")[6].firstChild.value+"^";
				rule+=$(cr).find("td")[7].firstChild.value;
			bcfs.push({
				id:id,
				indexname : indexs.split(":")[0],
				indexcode : indexs.split(":")[1],
				score : score,
				rule : rule,
				type:type
			});
		}
	}
	if(type==3)
	{
		var name = $("#fz_name").val();
		var score = $("#fz_score").val();
		if(name==""||score=="") 
		{
			alert("项目名或分数不可以为空");
			$("#fz_name").focus();
			return;
		}
		var cl = $("#thead_3").find("textarea").size();
		var fzrules="";
		for(var j=0;j<cl;j++)
		{
			var cr = $("#thead_3").find("textarea")[j];
			var rule = cr.value;
			if(rule=="") continue;
			fzrules+=rule;
			fzrules+="^";
		}
		fzrules+="~";
		var bca = $("#tbody_"+type).children();
		for(var i=0;i<bca.length;i++)
		{
			var cr = bca[i];
			var tda = $(cr).children();
			var v0 = tda[0].firstChild.value;
			if(v0=="") continue;
			for(var k=0;k<tda.length;k++)
			{
				fzrules+=tda[k].firstChild.value;
				fzrules+="^";
			}
			fzrules+="~";
		}
		bcfs.push({
				id:id,
				indexname : name,
				indexcode : "",
				score : score,
				rule : fzrules,
				type:2
			});
	}
	var data = {
		cfsrule:JSON.stringify(bcfs)
	}
	$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
	$.post("/cfscore/updateCfScoreRule",data, function(result){
		  if(!result.success)	 
		  {
			alert("操作失败！");
			return 
		  }
		  else
		  {
			  alert("操作成功！"); 
			  var id = $("#cfsid").val();
			  queryCfscoreRule(id);
		  }
	  });
}
