function showIndexPanel(id,source)

//取对象的绝对位置
function realOffset(o)
{
  var x = y = 0; 
  do{
  x += o.offsetLeft || 0; 
  y += o.offsetTop || 0;
  o = o.offsetParent;
  }while(o);
  return {"x" : x, "y" : y};
}

//定义规则
var exp = "";//规则表达式
function appendS(o,vid)
{
	var dst ;
	//区分事件发生在哪个面板

	var id = vid;
	dst = $("#"+id+"");
	//光标的起始位置
	var cx =0;
	var variable = o;
	if(exp=="")
	{
		exp+=variable;
	}
	else
	{
		//当输入区与缓存不相等时，则认为用户做了删除操作，则以输入区内容为准
		if(dst.val()!=exp)
		{
			exp = dst.val();
		}

		//计算字符串的插入位置,并把新串插入到老串中
	    cx = dst[0].selectionStart;
		if(exp.length>cx+1)
		{
			exp = exp.substring(0,cx)+variable+exp.substring(cx,exp.length);
		}
		else
		{
			exp+=variable;
		}
		
	}	
	dst.val(exp);
	//重置光标位置
	dst[0].selectionStart = cx+variable.length;
}

function queryDcheck()
{
	$("#q_tbody").empty();
	var id = $("#q_tr_id").val();
	var desc = $("#q_tr_title").val();
	if(id==""&&desc=="")
	{
		alert("查询参数为空！");
		return;
	}
	var data = {
		id:id,
		desc:desc
	};
	
	$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
	$.post("/dcheck/getDcheckByDescOrId",data, function(result){
		  if(!result.success)
		  {
			alert("操作失败！");
			return;
		  }
		  var dl = result.data;
		  if(dl!=null)
		  {
				
				for(var i=0;i<dl.length;i++)
				{
					var tr = dl[i];
					var id = tr.id;
					var ruleComments = tr.ruleComments;
					
					var html = "<tr>";
					html+="<td id='q_td_0"+i+"' style='border:1px solid #ccc'>"+id+"</td>";
					html+="<td id='q_td_1"+i+"' style='border:1px solid #ccc'>"+ruleComments+"</td>";
					html+="<td style='border:1px solid #ccc'><span style='cursor:pointer;color:red' onclick='modifyDcheck("+i+")'>修改</span>|<span style='cursor:pointer;color:red' onclick='delDcheck("+id+")'>删除</span></td>";
					html+="</tr>";
					$("#q_tbody").append(html);
				}
		  }
		  return;
	  });
}

		var xindexs="";
		var yindexs="";
		var csa = cs.split("~");

			var si = csa[i].split("^");

			var zi = si[0];
			if(zi==0)

					xindexs+=si[2];

function queryAllCompanysMZCondition()
{
	var rule = $("#tr_ruledefine").val();
	if(rule=="")
	{
		alert("规则不可以为空！");
		$("#tr_ruledefine").focus();
		return ;
	}
	var time = $("#test_time").val();
	var timeInterval = $("#timeInterval").val();
	var ruleType = $("#ruleType").val();
	var timeUnit = $("#timeUnit").val();
	var checkCount = $("#checkCount").val();
	var setTime = $("#setTime").val();
	if(setTime!="")
		time = setTime;
	var data = {
		rule:rule,
		time:time,
		checkCount:checkCount,
		timeInterval:timeInterval,
		ruleType:ruleType,
		timeUnit:timeUnit
	};
	$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
	$.post("/stock/tagrule/testAllCompanyTagrule",data, function(result){
		  if(!result.success)	 
		  {
			alert("操作失败！");
			return 
		  }
		  var testAllCompanyTagrule = result.data;
		 
		  if(testAllCompanyTagrule!="")
		  {
			  $("#mult-k").empty();
			  $("#queryAllCompanysMZCondition").empty();
			  var ca = testAllCompanyTagrule.split(";");
			  var size = ca.length;
			  if(ca[ca.length-1]=="")
				size=size-1;
			  $("#queryAllCompanysMZCondition").append("共计:"+size+"家;");
			  for(var i=0;i<ca.length;i++)
			  {
					var cs = ca[i];
					var cname = cs.split(":")[0];
					var ccode = cs.split(":")[1];
					var color="";
					if(cname=="date")
						color="red";
					$("#queryAllCompanysMZCondition").append("<a class='a-clazz' style='color:"+color+"' href='#' cname='"+cname+"' ccode='"+ccode+"' onclick='return false;'>"+cs+"</a>");
			  }
			 
			  $("#queryAllCompanysMZCondition").find(".a-clazz").bind("click",function(){
					 var cname = $(this).attr("cname");
					 var ccode = $(this).attr("ccode");
					 var clazz = "a-clazz-"+new Date().getTime();
					 if(cname!="date")
						addMkItem(clazz,cname,ccode);
					var finded = false;
					var fdate ;
					$("#queryAllCompanysMZCondition").find(".a-clazz").each(function(){
						var fcname = $(this).attr("cname");
						var fccode = $(this).attr("ccode");
						if(fccode == ccode)
							finded = true;
						if(finded==true&&fcname=="date")
						{
							fdate = fccode.substring(0,4)+"-"+fccode.substring(4,6)+"-"+fccode.substring(6,8);
							return false;
						}
					});
					
					if(fdate!=null)
						testThis(cname,ccode,fdate);
			  });
		  }
		  else
		  {
				$("#queryAllCompanysMZCondition").text("没有相关的公司！");
		  }
	  });
}
