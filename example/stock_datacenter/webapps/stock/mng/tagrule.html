//取对象的绝对位置
function realOffset(o)
{
  var x = y = 0; 
  do{
  x += o.offsetLeft || 0; 
  y += o.offsetTop || 0;
  o = o.offsetParent;
  }while(o);
  return {"x" : x, "y" : y};
}

//定义规则
var exp = "";//规则表达式
function appendS(o,vid)
{
	var dst ;
	//区分事件发生在哪个面板

	var id = vid;
	dst = $("#"+id+"");
	//光标的起始位置
	var cx =0;
	var variable = o;
	if(exp=="")
	{
		exp+=variable;
	}
	else
	{
		//当输入区与缓存不相等时，则认为用户做了删除操作，则以输入区内容为准
		if(dst.val()!=exp)
		{
			exp = dst.val();
		}

		//计算字符串的插入位置,并把新串插入到老串中
	    cx = dst[0].selectionStart;
		if(exp.length>cx+1)
		{
			exp = exp.substring(0,cx)+variable+exp.substring(cx,exp.length);
		}
		else
		{
			exp+=variable;
		}
		
	}	
	dst.val(exp);
	//重置光标位置
	dst[0].selectionStart = cx+variable.length;
}

function mrToString(v)
{
	var ratio = v.uptimes/(v.uptimes+v.downtimes)*100;
	var color = "green";
	if(parseFloat(v.zf)>0)
		color = "red";
	return "<tr><td>k="+v.k+"</td><td>zf=<span style='color:"+color+"'>"+v.zf+"%</span></td><td>uptimes="+v.uptimes+"</td><td>downtimes="+v.downtimes+"</td><td>tratio="+ratio.toFixed(2)+"%</td></tr>";
}

function queryTagrule()
{
	
	var id = $("#q_tr_id").val();
	var tagDesc = $("#q_tr_title").val();
	if(id==""&&tagDesc=="")
	{
		alert("查询参数为空！");
		return;
	}
	var data = {
		id:id,
		tagDesc:tagDesc
	};
	
	$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
	$.post("/stock/tagrule/getTagruleByTagdescOrId",data, function(result){
		  $("#q_tbody").empty();
		  if(!result.success)
		  {
			alert("操作失败！");
			return;
		  }
		  var dl = result.data;
		  if(dl!=null)
		  {
				
				for(var i=0;i<dl.length;i++)
				{
					var tr = dl[i];
					var id = tr.id;
					var tagDesc = tr.tagDesc;
					var tsc = tr.tsc;
					var industryTag = tr.industryTag;
					var rule = tr.ruleOriginal;
					var charDesc = tr.chartDesc;
					var type=tr.type;
					var comments = tr.comments==null?"":tr.comments;
					var html = "<tr timeUnit='"+tr.timeUnit+"' timeInterval='"+tr.timeInterval+"' ruleType='"+tr.ruleType+"'>";
					html+="<td id='q_td_0"+i+"' style='border:1px solid #ccc'>"+id+"</td>";
					html+="<td id='q_td_1"+i+"' style='border:1px solid #ccc'>"+tagDesc+"</td>";
					html+="<td id='q_td_7"+i+"' style='border:1px solid #ccc'>"+comments+"</td>";

					html+="<td id='q_td_3"+i+"' style='border:1px solid #ccc'>"+charDesc+"</td>";
					html+="<td id='q_td_4"+i+"' style='border:1px solid #ccc'>"+industryTag+"</td>";
					html+="<td id='q_td_5"+i+"' style='border:1px solid #ccc'>"+tsc+"</td>";
					html+="<td id='q_td_6"+i+"' style='border:1px solid #ccc'>"+type+"</td>";

		var yindexs="";

var trendschart_tr = function(id,yaxis) {
		var cwidth = $("#"+id).width()-5;
		return new Highcharts.Chart({
			chart : {
				renderTo : id,
				width : cwidth,
			},
			title: {
	         text: "财务指标趋势图"
			},
			yAxis :yaxis,
			xAxis : {
				type : "datetime",//时间轴要加上这个type，默认是linear
				//自定义x刻度上显示的时间格式，根据间隔大小，以下面预设的小时/分钟/日的格式来显示
				dateTimeLabelFormats:
					{
					 month : '%Q'
					},
				title: {
					text: null
				}
			},
			tooltip: {
				formatter: function() {
					var name = Highcharts.dateFormat('%Q',this.x).replace(/-/g,"")+"<br/>"+this.series.name+'<b>,'+ this.y +'</b>';
					return name;
				}
			},
			plotOptions : {
				series : {
					pointWidth : 11,
					borderWidth : 0,
					shadow : false
				}
			},
			legend : {
				align : 'center',
				maxHeight:40,
				verticalAlign : 'bottom',
				backgroundColor : '#FFFFFF',
				itemStyle: {
                 fontSize: '10px'
				}
			},
			credits : {
				enabled : false
			},
			series : []
		});
}

function createTrendsAnalysis_tr(id,company,chartshow,stime,etime,chart)
{
	try{
	var cchart = chart;
	var companyname = company.split(":")[0];
	var companycode = company.split(":")[1];
	var data={
		companycode:companycode,
		chartshow:chartshow,
		stime:stime,
		etime:etime
	};
	$.ajaxSetup({contentType:"application/x-www-form-urlencoded; charset=UTF-8"});
	$.getScript("/stock/trends/getTagruleShow?"+$.param(data), function(result){
		  var rm = taret;
		  if(rm==null||rm.vl==null||rm.vl=="")
			{
			  return;
			}
		var dl = rm.vl.split("~");
		
		var cname =rm.cname;
		var yaxis = [{
					title:
					{
						text:null
					},
					lineWidth: 1,
					opposite : 0//0=左侧，1=右侧
					},{
					title:
					{
						text:null
					},
					lineWidth: 1,
					opposite : 1//0=左侧，1=右侧
					}];	
		/*
		if(chart!=null)
			cchart=chart;
		*/
		if(cchart==null)
			cchart = new trendschart_tr(id,yaxis);
		
		if(cchart.yAxis.length<2)
		{
			cchart.addAxis({
					title:
					{
						text:null
					},
					lineWidth: 1,
					opposite: 1
			});
		}
		for(var i=0;i<dl.length;i++)
		{
				if(dl[i]=="") continue;
				//分隔指标编码与名字
				var cd = dl[i].split("&");
				if(cd=="") continue;
				if(cd=="") continue;
				var ctname = cd[0];//公司或行业名
				if(ctname.indexOf("_")>=0)
					ctname = ctname.split("_")[2]+"行业";
				var indexname = cd[1].split(":")[0];
				var indexcode = cd[1].split(":")[1];
				var udesc = getUnitDesc(cd[1].split(":")[2]);
				   if(udesc!="")
						indexname = indexname+"("+udesc+")";
				var yindex = parseInt(cd[2]);
				var stype = cd[3];
				if(cd.length<5) continue;
				var vl = cd[4].split("|");
				var pointdata = new Array();
				for(var k=0;k<vl.length;k++)
				{
					if(vl[k]=="") continue;
					var y=parseFloat(vl[k].split("^")[0]).toFixed(2);
					var time=vl[k].split("^")[1];
					pointdata.push({
					x: parseInt(time),
					y: parseFloat(y)
					});	
				}
				var oldtitle = cchart.yAxis[yindex].options.title.text;
									if(oldtitle!=null&&oldtitle!=""&&oldtitle!="Values")
									{
										if(oldtitle.indexOf(indexname)<0)
											cchart.yAxis[yindex].setTitle({text:oldtitle+"|"+indexname});
									}
									else
									{
										cchart.yAxis[yindex].setTitle({text:indexname});
									}
				var sra = $("#tr_showDefine").val().split("~");
				for(var m=0;m<sra.length;m++)
				{
					var sr = sra[m];
					if(sr=="") continue;
					if(sr.indexOf(indexcode)>=0)
						{
							var nst = sr.split("^")[1];
							if(nst!=null&&nst!="")
								stype = nst;
						}
				}
				cchart.addSeries({
						type: stype,
						name:ctname+":"+indexname,
						yAxis : yindex,
						data: pointdata
							});
		}

	
	  });	

	 }catch(e)
	 {
		console.log(e);
	 }
}
