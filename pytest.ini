# 基于design-v1.md规范的pytest配置

[pytest]
# 测试文件路径
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py *_test.py

# 测试类匹配模式
python_classes = Test* *Test

# 测试函数匹配模式
python_functions = test_* *_test

# 命令行选项
addopts = -v --strict-markers --strict-config --tb=short --durations=10

# 异步测试模式
asyncio_mode = auto

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    database: 需要数据库的测试
    llm: 需要LLM的测试
    external: 需要外部服务的测试

# 过滤选项
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 最小测试版本
minversion = 7.4